<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d9488">
<title>FitCoach — Tu entrenador de bolsillo</title>
<style>
  :root{
    --teal:#0d9488; --teal-osc:#0f766e; --teal-cl:#ccfbf1; --teal-bd:#5eead4;
    --indigo:#4f46e5; --indigo-cl:#e0e7ff;
    --naranja:#ea580c; --naranja-cl:#ffedd5; --naranja-bd:#fdba74;
    --verde:#16a34a; --verde-cl:#dcfce7;
    --rojo:#dc2626; --rojo-cl:#fee2e2;
    --amar:#ca8a04; --amar-cl:#fef9c3;
    --gris:#64748b; --gris-cl:#f1f5f9; --borde:#e2e8f0;
    --texto:#0f172a; --sub:#475569; --fondo:#f8fafc; --tarjeta:#ffffff;
    --sombra:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
    --sombra-md:0 4px 12px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--fondo); color:var(--texto); line-height:1.45; font-size:15px; padding-bottom:76px;}
  h1,h2,h3{margin:0;}
  button{font-family:inherit;}
  input,select,textarea{font-family:inherit; font-size:15px;}

  /* Header */
  header{background:linear-gradient(135deg,var(--teal),var(--teal-osc)); color:#fff;
    padding:14px 18px; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:30; box-shadow:var(--sombra-md);}
  header .logo{font-size:19px; font-weight:800; display:flex; align-items:center; gap:8px;}
  header .fecha-hoy{font-size:12.5px; opacity:.85; text-transform:capitalize;}
  .btn-icono{background:rgba(255,255,255,.18); border:none; color:#fff; width:38px; height:38px;
    border-radius:10px; font-size:17px; cursor:pointer;}
  .btn-icono:hover{background:rgba(255,255,255,.3);}

  .wrap{max-width:640px; margin:0 auto; padding:16px;}

  /* Tarjetas */
  .card{background:var(--tarjeta); border-radius:16px; box-shadow:var(--sombra); padding:16px; margin-bottom:14px;}
  .card h3{font-size:15px; margin-bottom:12px; display:flex; align-items:center; gap:7px;}
  .card h3 .em{font-size:17px;}
  .muted{color:var(--sub); font-size:13px;}

  /* Anillo de calorías */
  .anillo-wrap{display:flex; align-items:center; gap:18px; justify-content:center; flex-wrap:wrap;}
  .anillo{position:relative; width:170px; height:170px; flex-shrink:0;}
  .anillo svg{transform:rotate(-90deg);}
  .anillo .centro{position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;}
  .anillo .centro .grande{font-size:32px; font-weight:800; line-height:1;}
  .anillo .centro .chico{font-size:12px; color:var(--sub); margin-top:3px;}
  .anillo .centro .rest{font-size:12.5px; font-weight:700; margin-top:5px;}
  .mini-stats{display:flex; flex-direction:column; gap:10px; min-width:150px;}
  .mini{display:flex; align-items:center; gap:9px; font-size:13.5px;}
  .mini .dot{width:11px; height:11px; border-radius:3px; flex-shrink:0;}
  .mini b{margin-left:auto; font-variant-numeric:tabular-nums;}

  /* Macros barras */
  .macros{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:14px;}
  .macro{background:var(--gris-cl); border-radius:12px; padding:10px; text-align:center;}
  .macro .lbl{font-size:11.5px; color:var(--sub); font-weight:600; text-transform:uppercase; letter-spacing:.03em;}
  .macro .val{font-size:17px; font-weight:800; margin:2px 0;}
  .macro .bar{height:6px; border-radius:4px; background:#fff; overflow:hidden; margin-top:6px;}
  .macro .bar > div{height:100%; border-radius:4px; transition:.3s;}
  .macro .meta-txt{font-size:10.5px; color:var(--sub); margin-top:4px;}

  /* Semáforo */
  .semaforo{display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:12px; margin-top:4px;}
  .semaforo .ico{font-size:26px;}
  .semaforo .txt{font-size:13.5px; font-weight:600;}
  .sem-ok{background:var(--verde-cl); color:#14532d;}
  .sem-warn{background:var(--amar-cl); color:#713f12;}
  .sem-bad{background:var(--rojo-cl); color:#7f1d1d;}
  .sem-info{background:var(--teal-cl); color:#134e4a;}

  /* Botones */
  .btn{border:none; border-radius:11px; padding:11px 16px; font-size:15px; font-weight:700;
    cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:7px;}
  .btn-primary{background:var(--teal); color:#fff;} .btn-primary:hover{background:var(--teal-osc);}
  .btn-naranja{background:var(--naranja); color:#fff;} .btn-naranja:hover{background:#c2410c;}
  .btn-indigo{background:var(--indigo); color:#fff;} .btn-indigo:hover{background:#4338ca;}
  .btn-ghost{background:var(--gris-cl); color:var(--texto);} .btn-ghost:hover{background:#e2e8f0;}
  .btn-block{width:100%;}
  .btn-sm{padding:7px 12px; font-size:13px; border-radius:9px;}
  .btn-danger{background:var(--rojo-cl); color:var(--rojo);}

  /* Inputs */
  .campo{margin-bottom:13px;}
  .campo label{display:block; font-size:12.5px; color:var(--sub); font-weight:700; margin-bottom:5px;}
  .campo input,.campo select,.campo textarea{width:100%; padding:11px 12px; border:1.5px solid var(--borde);
    border-radius:11px; background:#fff; color:var(--texto);}
  .campo input:focus,.campo select:focus,.campo textarea:focus{outline:none; border-color:var(--teal); box-shadow:0 0 0 3px var(--teal-cl);}
  .fila{display:flex; gap:10px;} .fila > *{flex:1;}

  /* Chips selección */
  .chips{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{border:1.5px solid var(--borde); background:#fff; border-radius:11px; padding:10px 13px;
    font-size:13.5px; cursor:pointer; font-weight:600; color:var(--sub); flex:1; text-align:center; min-width:90px;}
  .chip.sel{border-color:var(--teal); background:var(--teal-cl); color:var(--teal-osc);}
  .chip small{display:block; font-weight:500; font-size:11px; opacity:.85; margin-top:2px;}

  /* Listas de registros */
  .item{display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--borde);}
  .item:last-child{border-bottom:none;}
  .item .ico{width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0;}
  .item .info{flex:1; min-width:0;}
  .item .info .n{font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .item .info .s{font-size:12px; color:var(--sub);}
  .item .val{font-weight:800; font-variant-numeric:tabular-nums; text-align:right; font-size:14px;}
  .item .del{background:none; border:none; color:var(--rojo); cursor:pointer; font-size:16px; padding:4px;}

  .grupo-comida{margin-bottom:8px;}
  .grupo-comida .cab{display:flex; align-items:center; gap:8px; font-size:13px; font-weight:800; color:var(--sub);
    text-transform:uppercase; letter-spacing:.04em; margin:14px 0 4px; padding-top:6px;}
  .grupo-comida .cab .kc{margin-left:auto; color:var(--teal-osc);}

  /* Tabs inferiores */
  nav.tabs{position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--borde);
    display:flex; z-index:30; box-shadow:0 -2px 10px rgba(0,0,0,.05); padding-bottom:env(safe-area-inset-bottom);}
  nav.tabs button{flex:1; background:none; border:none; padding:9px 2px 8px; cursor:pointer; color:var(--gris);
    display:flex; flex-direction:column; align-items:center; gap:2px; font-size:10.5px; font-weight:600;}
  nav.tabs button .i{font-size:20px;}
  nav.tabs button.act{color:var(--teal);}

  .pantalla{display:none;} .pantalla.act{display:block;}
  .tit-pantalla{font-size:22px; font-weight:800; margin-bottom:3px;}
  .sub-pantalla{color:var(--sub); font-size:13.5px; margin-bottom:16px;}

  /* Grid de números */
  .kpis{display:grid; grid-template-columns:repeat(2,1fr); gap:10px;}
  .kpi{background:var(--gris-cl); border-radius:12px; padding:12px;}
  .kpi .l{font-size:11.5px; color:var(--sub); font-weight:700;}
  .kpi .v{font-size:22px; font-weight:800; margin-top:2px; font-variant-numeric:tabular-nums;}
  .kpi .u{font-size:12px; color:var(--sub); font-weight:600;}

  /* Modal */
  .modal-bg{position:fixed; inset:0; background:rgba(15,23,42,.5); z-index:50; display:none;
    align-items:flex-end; justify-content:center;}
  .modal-bg.abierto{display:flex;}
  .modal{background:#fff; width:100%; max-width:640px; border-radius:22px 22px 0 0; padding:20px;
    max-height:90vh; overflow-y:auto; animation:subir .25s ease;}
  @keyframes subir{from{transform:translateY(30px); opacity:.5;} to{transform:none; opacity:1;}}
  .modal .barra{width:40px; height:4px; background:var(--borde); border-radius:3px; margin:0 auto 14px;}
  .modal h3{font-size:18px; margin-bottom:14px;}

  /* Buscador alimentos */
  .resultados{max-height:230px; overflow-y:auto; margin-top:6px;}
  .res-item{display:flex; align-items:center; gap:10px; padding:10px; border-radius:10px; cursor:pointer;}
  .res-item:hover{background:var(--teal-cl);}
  .res-item .info{flex:1;}
  .res-item .info .n{font-weight:600; font-size:14px;}
  .res-item .info .s{font-size:12px; color:var(--sub);}

  /* Progreso plan */
  .barra-prog{height:12px; background:var(--gris-cl); border-radius:8px; overflow:hidden;}
  .barra-prog > div{height:100%; background:linear-gradient(90deg,var(--teal),var(--verde)); border-radius:8px; transition:.4s;}
  .racha{display:flex; align-items:center; gap:14px; background:linear-gradient(135deg,var(--naranja),#f97316);
    color:#fff; border-radius:16px; padding:16px;}
  .racha .fuego{font-size:40px;}
  .racha .n{font-size:30px; font-weight:800; line-height:1;}
  .racha .l{font-size:13px; opacity:.9;}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px; margin-top:12px;}
  .cal-dia{aspect-ratio:1; border-radius:7px; display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700; background:var(--gris-cl); color:var(--sub);}
  .cal-dia.ok{background:var(--verde); color:#fff;}
  .cal-dia.no{background:var(--rojo-cl); color:var(--rojo);}
  .cal-dia.hoy{outline:2.5px solid var(--teal); outline-offset:1px;}

  canvas{width:100%; display:block;}

  /* Onboarding */
  .onb{position:fixed; inset:0; z-index:100; background:linear-gradient(160deg,var(--teal),var(--teal-osc));
    display:flex; align-items:center; justify-content:center; padding:16px; overflow-y:auto;}
  .onb.oculto{display:none;}
  .onb-card{background:#fff; border-radius:22px; width:100%; max-width:480px; padding:24px; margin:auto;
    box-shadow:0 20px 60px rgba(0,0,0,.35);}
  .onb-prog{display:flex; gap:5px; margin-bottom:18px;}
  .onb-prog > div{flex:1; height:5px; border-radius:3px; background:var(--borde);}
  .onb-prog > div.on{background:var(--teal);}
  .onb-card h2{font-size:21px; margin-bottom:5px;}
  .onb-card .paso-sub{color:var(--sub); font-size:13.5px; margin-bottom:18px;}
  .onb-nav{display:flex; gap:10px; margin-top:8px;}
  .onb-emoji{font-size:44px; text-align:center; margin-bottom:6px;}

  .pill{display:inline-block; padding:3px 10px; border-radius:20px; font-size:11.5px; font-weight:700;}
  .pill-teal{background:var(--teal-cl); color:var(--teal-osc);}
  .pill-naranja{background:var(--naranja-cl); color:var(--naranja);}
  .divider{height:1px; background:var(--borde); margin:14px 0;}
  .vacio{text-align:center; color:var(--sub); padding:26px 10px; font-size:13.5px;}
  .vacio .em{font-size:34px; display:block; margin-bottom:8px;}

  .toast{position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:var(--texto);
    color:#fff; padding:11px 18px; border-radius:12px; font-size:13.5px; font-weight:600; z-index:200;
    opacity:0; transition:.3s; pointer-events:none; box-shadow:var(--sombra-md);}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-6px);}

  /* Candado / login */
  .candado{position:fixed; inset:0; z-index:120; background:linear-gradient(160deg,var(--teal),var(--teal-osc));
    display:flex; align-items:center; justify-content:center; padding:18px; overflow-y:auto;}
  .candado.oculto{display:none;}
  .auth-card{background:#fff; border-radius:22px; box-shadow:0 20px 60px rgba(0,0,0,.35); width:100%; max-width:400px; padding:26px 24px; margin:auto;}
  .auth-logo{text-align:center; font-size:44px; margin-bottom:2px;}
  .auth-card h2{text-align:center; font-size:22px; margin-bottom:4px;}
  .auth-sub{text-align:center; color:var(--sub); font-size:13.5px; margin-bottom:18px;}
  .auth-error{background:var(--rojo-cl); border:1px solid #fca5a5; color:#8a1c14; padding:10px 12px; border-radius:11px; font-size:13px; margin-bottom:12px; display:none;}
  .auth-error.show{display:block;}
  .pista-box{background:var(--teal-cl); border:1px solid var(--teal-bd); color:#0f5c53; padding:10px 12px; border-radius:11px; font-size:13px; margin-bottom:12px;}
  .auth-aviso{background:var(--amar-cl); border:1px solid #fde68a; color:#78560a; padding:10px 12px; border-radius:11px; font-size:12.5px; margin-top:14px;}
  .ver-pass{font-size:12.5px; color:var(--sub); cursor:pointer; user-select:none; display:inline-flex; align-items:center; gap:6px; margin-top:6px;}
  .ver-pass input{width:auto;}
  .fuerza{height:6px; border-radius:4px; background:var(--gris-cl); margin-top:8px; overflow:hidden;}
  .fuerza > div{height:100%; width:0; transition:.2s; border-radius:4px;}
  .fuerza-txt{font-size:11.5px; color:var(--sub); margin-top:4px; min-height:14px;}
  .auth-link{text-align:center; margin-top:14px; font-size:13px;}
  .auth-link button{background:none; border:none; color:var(--teal-osc); cursor:pointer; text-decoration:underline; font-size:13px;}
  .mantener{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--sub); margin:4px 0 12px; cursor:pointer;}
  .mantener input{width:auto;}
</style>
</head>
<body>

<!-- ══════════ CANDADO / ACCESO ══════════ -->
<div class="candado" id="candado">
  <div class="auth-card">
    <div class="auth-logo">💪🔒</div>
    <h2>FitCoach</h2>
    <div class="auth-sub" id="authSub">Cargando…</div>
    <div class="auth-error" id="authError"></div>

    <!-- Registro -->
    <form id="formRegistro" style="display:none;">
      <div class="campo"><label>Usuario</label><input id="regUsuario" autocomplete="username" placeholder="Tu nombre de usuario"></div>
      <div class="campo"><label>Contraseña</label><input id="regPass" type="password" autocomplete="new-password" placeholder="Mínimo 8 caracteres">
        <div class="fuerza"><div id="fuerzaBar"></div></div><div class="fuerza-txt" id="fuerzaTxt"></div>
        <label class="ver-pass"><input type="checkbox" id="regVer"> Ver contraseña</label></div>
      <div class="campo"><label>Repetir contraseña</label><input id="regPass2" type="password" autocomplete="new-password" placeholder="Repite tu contraseña"></div>
      <div class="campo"><label>Pista (opcional)</label><input id="regHint" placeholder="Algo que solo tú entiendas"></div>
      <label class="mantener"><input type="checkbox" id="regMantener" checked> Mantener sesión iniciada en este dispositivo</label>
      <button class="btn btn-primary btn-block" id="btnRegistro" type="submit">Crear cuenta segura</button>
      <div class="auth-aviso">🔒 Tus datos se cifran en tu dispositivo. Si olvidas la contraseña <b>no se pueden recuperar</b> (por seguridad).</div>
      <div class="auth-link"><button type="button" id="irLogin">Ya tengo una cuenta</button></div>
    </form>

    <!-- Login -->
    <form id="formLogin" style="display:none;">
      <div class="pista-box" id="pistaBox" style="display:none;"></div>
      <div class="campo"><label>Usuario</label><input id="loginUsuario" autocomplete="username" placeholder="Tu usuario"></div>
      <div class="campo"><label>Contraseña</label><input id="loginPass" type="password" autocomplete="current-password" placeholder="Tu contraseña">
        <label class="ver-pass"><input type="checkbox" id="loginVer"> Ver contraseña</label></div>
      <label class="mantener"><input type="checkbox" id="loginMantener" checked> Mantener sesión iniciada</label>
      <button class="btn btn-primary btn-block" id="btnLogin" type="submit">Entrar</button>
      <div class="auth-link"><button type="button" id="irBorrar">Olvidé mi contraseña / empezar de cero</button></div>
    </form>
  </div>
</div>

<!-- ══════════ ONBOARDING ══════════ -->
<div class="onb" id="onb">
  <div class="onb-card">
    <div class="onb-prog" id="onbProg"></div>
    <div id="onbPaso"></div>
    <div class="onb-nav">
      <button class="btn btn-ghost" id="onbAtras" style="display:none;">← Atrás</button>
      <button class="btn btn-primary btn-block" id="onbSig">Siguiente →</button>
    </div>
  </div>
</div>

<!-- ══════════ APP ══════════ -->
<div id="app" style="display:none;">
  <header>
    <div>
      <div class="logo">💪 FitCoach</div>
      <div class="fecha-hoy" id="fechaHoy"></div>
    </div>
    <button class="btn-icono" id="btnMenu" title="Menú">⚙️</button>
  </header>

  <div class="wrap">
    <!-- HOY -->
    <section class="pantalla act" id="p-hoy"></section>
    <!-- COMIDAS -->
    <section class="pantalla" id="p-comidas"></section>
    <!-- ACTIVIDAD -->
    <section class="pantalla" id="p-actividad"></section>
    <!-- PESO -->
    <section class="pantalla" id="p-peso"></section>
    <!-- MEDIDAS -->
    <section class="pantalla" id="p-medidas"></section>
    <!-- PLAN -->
    <section class="pantalla" id="p-plan"></section>
  </div>

  <nav class="tabs" id="tabs">
    <button data-p="hoy" class="act"><span class="i">🏠</span>Hoy</button>
    <button data-p="comidas"><span class="i">🍽️</span>Comidas</button>
    <button data-p="actividad"><span class="i">🏃</span>Actividad</button>
    <button data-p="peso"><span class="i">⚖️</span>Peso</button>
    <button data-p="medidas"><span class="i">📏</span>Medidas</button>
    <button data-p="plan"><span class="i">🎯</span>Plan</button>
  </nav>
</div>

<!-- Modal genérico -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal">
    <div class="barra"></div>
    <div id="modalContenido"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
/* ══════════════════════════════════════════════════════════════
   FitCoach — Tu entrenador de bolsillo
   App 100% local (localStorage), sin servidor. Datos privados.
   ══════════════════════════════════════════════════════════════ */

/* ---------- Utilidades ---------- */
const $ = s => document.querySelector(s);
const hoyISO = () => new Date().toISOString().slice(0,10);
const fmt = (n,d=0) => Number(n).toLocaleString('es', {maximumFractionDigits:d, minimumFractionDigits:d});
const clamp = (n,a,b) => Math.max(a, Math.min(b,n));
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1900); }
function nombreDia(iso){ return new Date(iso+'T12:00').toLocaleDateString('es',{weekday:'long', day:'numeric', month:'long'}); }
function diasEntre(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }

/* ══════════════════════════════════════════════════════════════
   SEGURIDAD: login + cifrado AES-256-GCM (clave por PBKDF2)
   Mismo modelo que la app de finanzas. Datos ilegibles sin la clave.
   ══════════════════════════════════════════════════════════════ */
const VAULT_KEY="fitcoach_vault_v1", SESSION_KEY="fitcoach_sesion_v1";
const ITERACIONES=250000, CHECK_TOKEN="FITCOACH_OK", INACTIVIDAD_MS=30*60*1000;
const subtle=(window.crypto&&window.crypto.subtle)?window.crypto.subtle:null;
const txtEnc=new TextEncoder(), txtDec=new TextDecoder();
function b64(buf){ let s=""; const b=new Uint8Array(buf); for(let i=0;i<b.length;i++) s+=String.fromCharCode(b[i]); return btoa(s); }
function deB64(str){ return Uint8Array.from(atob(str),c=>c.charCodeAt(0)); }
function escapar(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
async function derivarLlave(p,salt){ const base=await subtle.importKey("raw",txtEnc.encode(p),"PBKDF2",false,["deriveKey"]);
  return subtle.deriveKey({name:"PBKDF2",salt,iterations:ITERACIONES,hash:"SHA-256"},base,{name:"AES-GCM",length:256},true,["encrypt","decrypt"]); }
async function guardarSesion(key){ try{ const raw=await subtle.exportKey("raw",key); localStorage.setItem(SESSION_KEY,b64(raw)); }catch(e){} }
function haySesion(){ return !!localStorage.getItem(SESSION_KEY); }
function borrarSesion(){ localStorage.removeItem(SESSION_KEY); }
async function cargarSesion(){ const s=localStorage.getItem(SESSION_KEY); if(!s) return null;
  try{ return await subtle.importKey("raw",deB64(s),{name:"AES-GCM",length:256},true,["encrypt","decrypt"]); }catch(e){ return null; } }
async function cifrar(key,obj){ const iv=crypto.getRandomValues(new Uint8Array(12));
  const ct=await subtle.encrypt({name:"AES-GCM",iv},key,txtEnc.encode(JSON.stringify(obj))); return {iv:b64(iv),ct:b64(ct)}; }
async function descifrar(key,blob){ const pt=await subtle.decrypt({name:"AES-GCM",iv:deB64(blob.iv)},key,deB64(blob.ct)); return JSON.parse(txtDec.decode(pt)); }
function leerVault(){ try{ const r=localStorage.getItem(VAULT_KEY); return r?JSON.parse(r):null; }catch(e){ return null; } }
function mostrarErr(m){ const el=$('#authError'); el.textContent=m; el.classList.add('show'); }

  vault.data=await cifrar(cryptoKey,estado); localStorage.setItem(VAULT_KEY,JSON.stringify(vault)); }).catch(e=>console.error(e)); }

function iniciarSeguridad(){
  if(!subtle){ $('#authSub').textContent=''; mostrarErr("Tu navegador no permite el cifrado seguro. Ábrela con Chrome, Edge o Safari desde un enlace https."); return; }
  vault=leerVault();
  if(vault){
    (async()=>{
      const k=await cargarSesion();
      if(k){ try{ estado=await descifrar(k,vault.data); cryptoKey=k; entrarApp(); return; }catch(e){ borrarSesion(); } }
      mostrarLogin();
    })();

}

$('#formRegistro').onsubmit=async e=>{
  e.preventDefault(); limpiarErr();
  const usuario=$('#regUsuario').value.trim(), p1=$('#regPass').value, p2=$('#regPass2').value, hint=$('#regHint').value.trim();
  if(!usuario){ mostrarErr('Escribe un nombre de usuario.'); return; }
  if(p1.length<8){ mostrarErr('La contraseña debe tener al menos 8 caracteres.'); return; }
  if(p1!==p2){ mostrarErr('Las contraseñas no coinciden.'); return; }
  const btn=$('#btnRegistro'); btn.disabled=true; btn.textContent='Cifrando…';
  try{
    const salt=crypto.getRandomValues(new Uint8Array(16)); const key=await derivarLlave(p1,salt);
    estado=estadoNuevo();
    vault={ v:1, usuario, hint, salt:b64(salt), iter:ITERACIONES, check:await cifrar(key,CHECK_TOKEN), data:await cifrar(key,estado) };
    localStorage.setItem(VAULT_KEY,JSON.stringify(vault)); cryptoKey=key;
    if($('#regMantener').checked) await guardarSesion(key); else borrarSesion();
    entrarApp();
  }catch(ex){ mostrarErr('No se pudo crear la cuenta: '+ex.message); }
  finally{ btn.disabled=false; btn.textContent='Crear cuenta segura'; }
};
$('#formLogin').onsubmit=async e=>{
  e.preventDefault(); limpiarErr();
  const usuario=$('#loginUsuario').value.trim(), pass=$('#loginPass').value;
  if(!pass){ mostrarErr('Escribe tu contraseña.'); return; }
  const btn=$('#btnLogin'); btn.disabled=true; btn.textContent='Verificando…';
  try{
    const key=await derivarLlave(pass,deB64(vault.salt)); let ok=false;
    try{ ok=(await descifrar(key,vault.check))===CHECK_TOKEN; }catch(_){ ok=false; }
    if(!ok || (vault.usuario && usuario && usuario!==vault.usuario)){ mostrarErr('Usuario o contraseña incorrectos.'); return; }
    cryptoKey=key; estado=await descifrar(key,vault.data);
    if($('#loginMantener').checked) await guardarSesion(key); else borrarSesion();
    $('#loginPass').value=''; entrarApp();
  }catch(ex){ mostrarErr('No se pudo entrar: '+ex.message); }
  finally{ btn.disabled=false; btn.textContent='Entrar'; }
};
function entrarApp(){
  limpiarErr();

    onbDatos.nombre=vault.usuario||''; onbIdx=0; renderOnb();
  }
  registrarInactividad();
}
function bloquear(){ cryptoKey=null; estado=null;

  $('#candado').classList.remove('oculto'); $('#loginPass').value=''; iniciarSeguridad(); }

/* ══════════════════════════════════════════════════════════════
   CÁLCULOS (motor científico)
   ══════════════════════════════════════════════════════════════ */
function calcMetricas(p){
  if(!p) return null;
  const kg = pesoActual();
  // TMB — Mifflin-St Jeor
  let tmb = 10*kg + 6.25*p.altura - 5*p.edad + (p.sexo==='h' ? 5 : -161);
  tmb = Math.round(tmb);
  const nivel = NIVELES.find(n=>n.id===p.nivel) || NIVELES[0];
  const neat = Math.round(tmb*(nivel.f-1));      // gasto por actividad diaria (sin ejercicio)
  const tdeeBase = Math.round(tmb*nivel.f);       // mantenimiento sin ejercicio estructurado
  // Ajuste según objetivo y ritmo
  let ajuste = 0;
  if(p.objetivo==='perder'){
    ajuste = -({suave:300, moderado:500, agresivo:700}[p.ritmo] || 500);
  } else if(p.objetivo==='ganar'){
    ajuste = ({suave:200, moderado:300, agresivo:450}[p.ritmo] || 300);
  } else { // recomp
    ajuste = -200; // déficit leve + proteína alta
  }
  const metaKcal = Math.max(1200, Math.round(tdeeBase + ajuste));
  // Macros
  const gProtKg = p.objetivo==='ganar' ? 1.8 : 2.0;
  const prot = Math.round(kg*gProtKg);
  const grasa = Math.round(kg*0.8);
  const kcalRest = metaKcal - (prot*4 + grasa*9);
  const carb = Math.max(0, Math.round(kcalRest/4));
  // Cambio de peso semanal estimado (7700 kcal ≈ 1 kg)
  const cambioSemKg = +(ajuste*7/7700).toFixed(2);
  return { tmb, neat, tdeeBase, ajuste, metaKcal, prot, grasa, carb, cambioSemKg, nivel, kg };
}

function pesoActual(){
  if(estado.peso.length){
    const ord = [...estado.peso].sort((a,b)=>a.fecha<b.fecha?1:-1);
    return ord[0].kg;
  }
  return estado.perfil ? estado.perfil.pesoInicial : 70;
}

/* Totales de un día */
function totalesDia(fecha){
  const c = estado.comidas.filter(x=>x.fecha===fecha);
  const kcal = c.reduce((s,x)=>s+x.kcal,0);
  const prot = c.reduce((s,x)=>s+(x.prot||0),0);
  const carb = c.reduce((s,x)=>s+(x.carb||0),0);
  const grasa = c.reduce((s,x)=>s+(x.grasa||0),0);
  const ejercicio = estado.actividad.filter(x=>x.fecha===fecha).reduce((s,x)=>s+x.kcal,0);
  return { kcal:Math.round(kcal), prot:Math.round(prot), carb:Math.round(carb), grasa:Math.round(grasa), ejercicio:Math.round(ejercicio) };
}

    render:()=>`<div class="onb-emoji">🍽️</div><h2>Tus comidas</h2>
      <p class="paso-sub">¿Cuántas comidas sueles hacer al día?</p>

        ${[2,3,4,5].map(n=>`<div class="chip ${onbDatos.comidasDia===n?'sel':''}" data-v="${n}">${n}</div>`).join('')}
      </div>`,
    init:()=>chipSelect('#c_com', v=>onbDatos.comidasDia=+v),
    guardar:()=>true
  },
  { // 7 resumen
    render:()=>{
      const prev = calcPreview();
      return `<div class="onb-emoji">✅</div><h2>Tu plan está listo</h2>
      <p class="paso-sub">Esto calculé para ti, ${onbDatos.nombre||'crack'}:</p>
      <div class="kpis" style="margin-bottom:12px;">
        <div class="kpi"><div class="l">🔥 Meta diaria</div><div class="v">${fmt(prev.metaKcal)}</div><div class="u">kcal/día</div></div>
        <div class="kpi"><div class="l">⚙️ Metabolismo basal</div><div class="v">${fmt(prev.tmb)}</div><div class="u">kcal (reposo)</div></div>
        <div class="kpi"><div class="l">💪 Proteína</div><div class="v">${fmt(prev.prot)}</div><div class="u">g/día</div></div>
        <div class="kpi"><div class="l">📊 Gasto total</div><div class="v">${fmt(prev.tdeeBase)}</div><div class="u">kcal/día</div></div>
      </div>
      <div class="semaforo sem-info"><span class="ico">🎯</span><span class="txt">
        A este ritmo cambiarías <b>${fmt(Math.abs(prev.cambioSemKg),2)} kg/semana</b>. ${prev.mensaje}</span></div>`;
    },
    guardar:()=>true, ultimo:true
  }
];

function calcPreview(){
  const p = { ...onbDatos, nivel:onbDatos.nivel };
  const kg = onbDatos.pesoInicial;
  let tmb = Math.round(10*kg + 6.25*onbDatos.altura - 5*onbDatos.edad + (onbDatos.sexo==='h'?5:-161));
  const nivel = NIVELES.find(n=>n.id===onbDatos.nivel)||NIVELES[0];
  const tdeeBase = Math.round(tmb*nivel.f);
  let ajuste = onbDatos.objetivo==='perder' ? -({suave:300,moderado:500,agresivo:700}[onbDatos.ritmo])
    : onbDatos.objetivo==='ganar' ? ({suave:200,moderado:300,agresivo:450}[onbDatos.ritmo]) : -200;
  const metaKcal = Math.max(1200, Math.round(tdeeBase+ajuste));
  const prot = Math.round(kg*(onbDatos.objetivo==='ganar'?1.8:2.0));
  const cambioSemKg = +(ajuste*7/7700).toFixed(2);
  const dif = Math.abs(onbDatos.pesoInicial - onbDatos.pesoMeta);
  const semanas = cambioSemKg? Math.ceil(dif/Math.abs(cambioSemKg)) : 0;
  const mensaje = semanas ? `Llegarías a tu meta en ~<b>${semanas} semanas</b>.` : '';
  return { tmb, tdeeBase, metaKcal, prot, cambioSemKg, mensaje };
}

function chipSelect(sel, cb){
  const cont = $(sel);
  cont.querySelectorAll('.chip').forEach(ch=>{
    ch.onclick = ()=>{ cont.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel')); ch.classList.add('sel'); cb(ch.dataset.v); };
  });
}

function renderOnb(){

  const paso = PASOS[onbIdx];
  $('#onbPaso').innerHTML = paso.render();

  $('#onbAtras').style.display = onbIdx>0 ? 'block' : 'none';

  onbIdx++; renderOnb();
};

function finalizarOnb(){
  estado.perfil = {
    nombre:onbDatos.nombre, sexo:onbDatos.sexo, edad:onbDatos.edad, altura:onbDatos.altura,

function elegirAlimento(idx, tipo){
  const a = ALIMENTOS[idx];
  const porcionDef = a.porcion || 100;
  abrirModal(`
    <h3>${a.e||'🍴'} ${a.n}</h3>
    <p class="muted">Por 100 g: ${fmt(a.k)} kcal · P ${fmt(a.p)} · C ${fmt(a.c)} · G ${fmt(a.g)}</p>
    <div class="campo"><label>Cantidad (gramos)</label>
      <input id="mGramos" type="number" inputmode="decimal" value="${porcionDef}" oninput="prevMacro(${idx})"></div>
    <div class="kpis" id="mPreview"></div>
    <div class="fila" style="margin-top:14px;">
      <button class="btn btn-ghost" onclick="guardarComoFrecuente(${idx})">⭐ Frecuente</button>
      <button class="btn btn-primary" onclick="confirmarAlimento(${idx}, '${tipo}')">Agregar</button>
    </div>
  `);
  prevMacro(idx);
}
function calcAlimento(idx, gramos){
  const a = ALIMENTOS[idx]; const f = gramos/100;
  return { kcal:Math.round(a.k*f), prot:+(a.p*f).toFixed(1), carb:+(a.c*f).toFixed(1), grasa:+(a.g*f).toFixed(1) };
}
function prevMacro(idx){
  const g = +$('#mGramos').value || 0;
  const v = calcAlimento(idx, g);
  $('#mPreview').innerHTML = `
    <div class="kpi"><div class="l">Calorías</div><div class="v">${fmt(v.kcal)}<span class="u"> kcal</span></div></div>
    <div class="kpi"><div class="l">Proteína</div><div class="v">${fmt(v.prot,1)}<span class="u"> g</span></div></div>`;
}
function confirmarAlimento(idx, tipo){
  const a = ALIMENTOS[idx]; const g = +$('#mGramos').value||0;
  if(g<=0){ toast('Ingresa una cantidad'); return; }
  const v = calcAlimento(idx, g);
  estado.comidas.push({ id:uid(), fecha:hoyISO(), tipo, nombre:a.n, gramos:g, ...v });
  guardar('comidas'); cerrarModal(); render(); toast('Comida agregada ✅');
}
function guardarComoFrecuente(idx){
  const a = ALIMENTOS[idx]; const g = +$('#mGramos').value||100;
  const v = calcAlimento(idx, g);
  estado.frecuentes.push({ id:uid(), nombre:`${a.n} (${g}g)`, ...v });
  guardar('frecuentes'); toast('Guardado en frecuentes ⭐');
}

  abrirModal(`
    <h3>✏️ Entrada manual</h3>
    <div class="campo"><label>Nombre</label><input id="cmN" placeholder="Ej: Ceviche, pizza casera..."></div>

    <div class="fila">
      <div class="campo"><label>Calorías</label><input id="cmK" type="number" inputmode="numeric" placeholder="kcal"></div>
      <div class="campo"><label>Proteína (g)</label><input id="cmP" type="number" inputmode="decimal" placeholder="g"></div>
    </div>
    <div class="fila">
      <div class="campo"><label>Carbos (g)</label><input id="cmC" type="number" inputmode="decimal" placeholder="g"></div>
      <div class="campo"><label>Grasas (g)</label><input id="cmG" type="number" inputmode="decimal" placeholder="g"></div>
    </div>
    <label style="display:flex; align-items:center; gap:8px; font-size:13.5px; margin-bottom:12px;">
      <input type="checkbox" id="cmFrec" style="width:auto;"> Guardar también como frecuente ⭐</label>
    <button class="btn btn-primary btn-block" onclick="confirmarManual()">Agregar</button>
  `);
  let tipoSel = TIPOS_COMIDA[0].id; chipSelect('#cmTipo', v=>tipoSel=v); window._cmTipo=()=>tipoSel;
}
function confirmarManual(){
  const nombre = $('#cmN').value.trim();
  const kcal = +$('#cmK').value||0;
  if(!nombre||kcal<=0){ toast('Pon nombre y calorías'); return; }
  const obj = { nombre, kcal, prot:+$('#cmP').value||0, carb:+$('#cmC').value||0, grasa:+$('#cmG').value||0 };
  estado.comidas.push({ id:uid(), fecha:hoyISO(), tipo:window._cmTipo(), gramos:null, ...obj });
  guardar('comidas');
  if($('#cmFrec').checked){ estado.frecuentes.push({ id:uid(), ...obj }); guardar('frecuentes'); }
  cerrarModal(); render(); toast('Comida agregada ✅');
}
function registrarFrecuente(id){
  const f = estado.frecuentes.find(x=>x.id===id); if(!f) return;
  const tipo = new Date().getHours()<11?'desayuno':new Date().getHours()<16?'almuerzo':new Date().getHours()<21?'cena':'snack';
  estado.comidas.push({ id:uid(), fecha:hoyISO(), tipo, nombre:f.nombre, gramos:null, kcal:f.kcal, prot:f.prot, carb:f.carb, grasa:f.grasa });
  guardar('comidas'); render(); toast(`+ ${f.nombre} ✅`);
}
function borrarComida(id){ estado.comidas = estado.comidas.filter(x=>x.id!==id); guardar('comidas'); render(); }
function borrarFrecuente(id){ estado.frecuentes = estado.frecuentes.filter(x=>x.id!==id); guardar('frecuentes'); render(); }

Identifica cada alimento visible, estima el peso en gramos de cada porción y calcula sus calorías y macros.
Sé realista con los tamaños de porción según lo que se ve en la foto. Suma un total.
Indica tu nivel de confianza (alta/media/baja) y una nota breve en español (ej: "Ración estimada, confirma el aceite").
Responde SOLO con el objeto pedido, en español.`;

/* Redimensiona/comprime la imagen a JPEG base64 (máx ~1024px) */
function comprimirImagen(file, maxLado){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    img.onload = ()=>{
      let {width:w, height:h} = img;
      const esc = Math.min(1, maxLado/Math.max(w,h));
      w = Math.round(w*esc); h = Math.round(h*esc);
      const cv = document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      const dataUrl = cv.toDataURL('image/jpeg', 0.72);
      resolve(dataUrl.split(',')[1]); // solo base64
    };
    img.onerror = reject;
    const r = new FileReader(); r.onload = e=>img.src=e.target.result; r.onerror=reject; r.readAsDataURL(file);
  });
}

async function analizarFotoIA(base64jpeg){
  const key = (cfg().apiKeyIA||'').trim();
  if(!key) throw new Error('SIN_CLAVE');
  const body = {
    model: IA_MODELO, max_tokens: 1024,
    messages: [{ role:'user', content:[
      { type:'image', source:{ type:'base64', media_type:'image/jpeg', data:base64jpeg } },
      { type:'text', text: IA_PROMPT }
    ]}],
    output_config: { format: { type:'json_schema', schema: IA_SCHEMA } }
  };
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{ 'content-type':'application/json', 'x-api-key':key,
      'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
    body: JSON.stringify(body)
  });
  if(!res.ok){
    let msg = 'Error '+res.status;
    if(res.status===401) msg='Clave de IA inválida. Revísala en ⚙️ Ajustes.';
    else if(res.status===429) msg='Límite de uso alcanzado. Intenta más tarde.';
    else if(res.status===400) msg='La imagen no se pudo procesar. Prueba otra foto.';
    throw new Error(msg);
  }
  const data = await res.json();
  const txt = (data.content||[]).find(b=>b.type==='text');
  if(!txt) throw new Error('Respuesta vacía de la IA.');
  return JSON.parse(txt.text);
}

/* ══════════════════════════════════════════════════════════════
   COACH DEL DÍA: analiza y sugiere ajustes para cerrar objetivos
   ══════════════════════════════════════════════════════════════ */
function comidasRestantesHoy(){
  const c = estado.comidas.filter(x=>x.fecha===hoyISO());
  const principales = ['desayuno','almuerzo','cena'];
  const hechas = new Set(c.map(x=>x.tipo));
  const objetivo = estado.perfil.comidasDia||3;
  // Comidas principales aún no registradas
  let restantes = principales.filter(p=>!hechas.has(p)).length;
  // Ajusta a las comidas que el usuario planea (si planea 2, no exijas 3)
  restantes = Math.min(restantes, Math.max(0, objetivo - hechas.size));
  return Math.max(restantes, 0);
}
function coachDelDia(){
  const m = calcMetricas(estado.perfil);
  const t = totalesDia(hoyISO());
  const metaAj = m.metaKcal + t.ejercicio;
  const restKcal = metaAj - t.kcal;
  const restProt = m.prot - t.prot;
  const comidasLeft = comidasRestantesHoy();
  const ganar = estado.perfil.objetivo==='ganar';
  const consejos = [];

  if(t.kcal===0){
    return { tono:'sem-info', ico:'🍽️', titulo:'Empieza a registrar',
      texto:`Tu meta de hoy es <b>${fmt(metaAj)} kcal</b> y <b>${fmt(m.prot)}g de proteína</b>. Registra tu primera comida (o toma una foto) y te iré guiando para cerrar el día en objetivo.`, consejos:[] };
  }

  // Reparto sugerido entre las comidas que faltan
  if(comidasLeft>0){
    const porComidaK = Math.max(0, Math.round(restKcal/comidasLeft));
    const porComidaP = Math.max(0, Math.round(restProt/comidasLeft));
    consejos.push(`🍽️ Te quedan <b>${comidasLeft}</b> comida(s) y <b>${fmt(restKcal)} kcal</b>. Apunta a ~<b>${fmt(porComidaK)} kcal</b> y ~<b>${fmt(porComidaP)}g de proteína</b> en cada una.`);
  }

  // Proteína
  if(restProt > 15) consejos.push(`💪 Vas <b>${fmt(restProt)}g</b> por debajo de tu proteína. Suma una fuente magra (pollo, atún, huevos, yogur griego o un scoop de proteína).`);
  else if(restProt <= 0) consejos.push(`💪 ¡Proteína cumplida! (${fmt(t.prot)}/${fmt(m.prot)}g). Excelente para cuidar tu músculo.`);

  // Estado calórico → tono + sugerencia de ajuste
  let tono, ico, titulo, texto;
  if(!ganar && restKcal < 0){
    // pasado del objetivo (déficit/recomp)
    tono='sem-bad'; ico='⚠️'; titulo='Te pasaste del objetivo';
    if(comidasLeft>0){
      const bajar = Math.round(-restKcal/comidasLeft);
      texto=`Vas <b>${fmt(-restKcal)} kcal</b> por encima de tu meta. Para cerrar en objetivo, baja ~<b>${fmt(bajar)} kcal</b> en cada comida restante (raciones más chicas, menos aceite/carbos).`;
    } else {
      const min = Math.round(-restKcal/60*10)/10;
      texto=`Vas <b>${fmt(-restKcal)} kcal</b> por encima y ya no quedan comidas. Compénsalo hoy con <b>~${fmt(-restKcal)} kcal de ejercicio</b> (p. ej. ${fmt(Math.max(20,Math.round(-restKcal/6)))} min de caminata rápida) o simplemente retómalo mañana — un día no rompe el progreso.`;
    }
  } else if(ganar && restKcal > 200 && comidasLeft===0){
    tono='sem-warn'; ico='🍽️'; titulo='Te falta para tu superávit';
    texto=`Te faltan <b>${fmt(restKcal)} kcal</b> para tu meta de crecimiento y ya no quedan comidas planificadas. Suma un snack calórico y proteico (frutos secos, mantequilla de maní, batido).`;
  } else if(restKcal <= (ganar?200:250) && restKcal >= (ganar?-50:-100)){
    tono='sem-ok'; ico='✅'; titulo='¡Vas perfecto!';
    texto=`Estás muy cerca de tu meta del día (${fmt(t.kcal)}/${fmt(metaAj)} kcal). ${restProt>15?'Solo cuida completar la proteína.':'Mantén el ritmo y cierra así.'}`;
  } else {
    tono='sem-info'; ico='🎯'; titulo='Vas en camino';
    texto=`Llevas <b>${fmt(t.kcal)}</b> de <b>${fmt(metaAj)} kcal</b>. Te quedan <b>${fmt(restKcal)} kcal</b> para tu objetivo de hoy.`;
  }
  return { tono, ico, titulo, texto, consejos };
}

  const dif = actual - inicial;
  const faltante = actual - meta;
  const progreso = inicial!==meta ? clamp((inicial-actual)/(inicial-meta)*100, 0, 100) : 0;
  const bajando = meta < inicial;

  let html = `
    <div class="tit-pantalla">Peso</div>
    <div class="sub-pantalla">Tu curva de seguimiento</div>

  const ordDesc = [...datos].reverse();

  ordDesc.forEach((x,i)=>{

    html += `<div class="item">

function calcRacha(){
  const m = calcMetricas(estado.perfil);
  const ultimos = [];
  for(let i=13;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    const f = d.toISOString().slice(0,10);
    const t = totalesDia(f);
    let estadoDia;
    if(t.kcal===0) estadoDia = f===hoyISO()?'':''; // sin registro
    else {
      const metaAj = m.metaKcal + t.ejercicio;
      if(estado.perfil.objetivo==='ganar') estadoDia = t.kcal>=m.metaKcal*0.9 ? 'ok':'no';
      else estadoDia = t.kcal<=metaAj*1.05 ? 'ok':'no';
    }
    ultimos.push({ fecha:f, estado:estadoDia });
  }
  // racha desde el final hacia atrás (contando días con registro cumplido)
  let racha=0;
  for(let i=ultimos.length-1;i>=0;i--){
    if(ultimos[i].estado==='ok') racha++;
    else if(ultimos[i].estado==='no') break;
    else if(ultimos[i].fecha===hoyISO()) continue; // hoy sin registro no rompe
    else break;
  }
  return { racha, ultimos };
}

function consejosCoach(m){
  const c = [];
  const p = estado.perfil;
  const t = totalesDia(hoyISO());
  c.push({ e:'💧', t:'Toma al menos 2-3 litros de agua al día. La hidratación mejora el rendimiento y controla el hambre.' });
  c.push({ e:'💪', t:`Apunta a <b>${fmt(m.prot)}g de proteína</b> diaria. Es lo más importante para conservar y ganar músculo en déficit.` });
  if(p.objetivo!=='ganar') c.push({ e:'🏋️', t:'Entrena fuerza 3-4 veces por semana. En déficit, el músculo se mantiene solo si le das el estímulo.' });
  else c.push({ e:'🏋️', t:'Sobrecarga progresiva: sube peso o reps cada semana. Sin estímulo creciente no hay músculo nuevo.' });
  c.push({ e:'😴', t:'Duerme 7-9 horas. El descanso es cuando el músculo se repara y se regulan las hormonas del hambre.' });
  c.push({ e:'📈', t:'Pésate varias veces por semana y mira la <b>tendencia</b>, no el número diario (varía por agua/sodio).' });
  if(p.ritmo==='agresivo') c.push({ e:'⚠️', t:'Elegiste ritmo agresivo: si te sientes sin energía o con mucha hambre, baja a moderado. La sostenibilidad gana.' });
  return c;
}

/* ══════════════════════════════════════════════════════════════
   GRÁFICA (canvas simple)
   ══════════════════════════════════════════════════════════════ */
function dibujarGrafica(id, puntos, meta, unidad){
  const cv = document.getElementById(id); if(!cv) return;
  const dpr = window.devicePixelRatio||1;
  const W = cv.clientWidth, H = cv.height;
  cv.width = W*dpr; cv.height = H*dpr;
  const ctx = cv.getContext('2d'); ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  const pad = {l:38, r:14, t:14, b:24};
  const gw = W-pad.l-pad.r, gh = H-pad.t-pad.b;
  if(puntos.length===0){ ctx.fillStyle='#94a3b8'; ctx.font='13px sans-serif'; ctx.textAlign='center'; ctx.fillText('Sin datos aún',W/2,H/2); return; }

  let vals = puntos.map(p=>p.y);
  if(meta!=null) vals = vals.concat([meta]);
  let min = Math.min(...vals), max = Math.max(...vals);
  const rango = (max-min)||1; min -= rango*0.15; max += rango*0.15;
  const X = i => puntos.length===1 ? pad.l+gw/2 : pad.l + (i/(puntos.length-1))*gw;
  const Y = v => pad.t + (1-(v-min)/(max-min))*gh;

  // grid + labels Y
  ctx.strokeStyle='#f1f5f9'; ctx.fillStyle='#94a3b8'; ctx.font='10px sans-serif'; ctx.textAlign='right';
  for(let i=0;i<=3;i++){
    const v = min + (max-min)*i/3; const y = Y(v);
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillText(fmt(v,1), pad.l-6, y+3);
  }
  // línea meta
  if(meta!=null){
    ctx.strokeStyle='#16a34a'; ctx.setLineDash([5,4]); ctx.beginPath();
    ctx.moveTo(pad.l,Y(meta)); ctx.lineTo(W-pad.r,Y(meta)); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle='#16a34a'; ctx.textAlign='left'; ctx.font='10px sans-serif';
    ctx.fillText('meta '+fmt(meta,1), pad.l+2, Y(meta)-4);
  }
  // área
  const grad = ctx.createLinearGradient(0,pad.t,0,H-pad.b);
  grad.addColorStop(0,'rgba(13,148,136,.25)'); grad.addColorStop(1,'rgba(13,148,136,0)');
  ctx.beginPath(); ctx.moveTo(X(0),Y(puntos[0].y));
  puntos.forEach((p,i)=>ctx.lineTo(X(i),Y(p.y)));
  ctx.lineTo(X(puntos.length-1),H-pad.b); ctx.lineTo(X(0),H-pad.b); ctx.closePath();
  ctx.fillStyle=grad; ctx.fill();
  // línea
  ctx.beginPath(); ctx.strokeStyle='#0d9488'; ctx.lineWidth=2.5; ctx.lineJoin='round';
  puntos.forEach((p,i)=>{ const x=X(i),y=Y(p.y); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); }); ctx.stroke();
  // puntos
  ctx.fillStyle='#0d9488';
  puntos.forEach((p,i)=>{ ctx.beginPath(); ctx.arc(X(i),Y(p.y),3.5,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(X(i),Y(p.y),3.5,0,7); ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke(); });
  // labels X (primero y último)
  ctx.fillStyle='#94a3b8'; ctx.font='10px sans-serif'; ctx.textAlign='center';
  const et = iso => new Date(iso+'T12:00').toLocaleDateString('es',{day:'numeric',month:'short'});
  ctx.fillText(et(puntos[0].x), X(0), H-6);
  if(puntos.length>1) ctx.fillText(et(puntos[puntos.length-1].x), X(puntos.length-1), H-6);
}

async function asegurarVaultActual(){
  if(cryptoKey && estado && vault){ vault.data = await cifrar(cryptoKey, estado); localStorage.setItem(VAULT_KEY, JSON.stringify(vault)); }
}
function driveMsg(html){ const el=$('#driveMsg'); if(el) el.innerHTML=html; }
async function descargarRespaldo(){
  await asegurarVaultActual();
  const blob = new Blob([JSON.stringify(vault,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = nombreRespaldo(); a.click(); URL.revokeObjectURL(a.href);
  driveMsg('Archivo descargado. Puedes subirlo a Drive desde tus Descargas.'); toast('Copia descargada 💾');

async function respaldarDrive(){
  await asegurarVaultActual();
  driveMsg('');
  const file = new File([JSON.stringify(vault,null,2)], nombreRespaldo(), {type:'application/json'});
  try{
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({ files:[file], title:'Respaldo de FitCoach',
        text:'Copia cifrada de tus datos de FitCoach. Guárdala en Google Drive (o iCloud).' });
      driveMsg('✅ Si elegiste Google Drive, tu copia quedó guardada ahí.');
    } else {
      await descargarRespaldo();
      driveMsg('Tu navegador descargó el archivo. Ábrelo y toca <b>Compartir → Google Drive</b> para guardarlo ahí.');
    }
  }catch(e){
    if(e && e.name==='AbortError'){ driveMsg('Cancelaste el guardado.'); return; }
    await descargarRespaldo();
    driveMsg('Descargué el archivo; guárdalo en Google Drive desde <b>Compartir</b>.');
  }
}
function importarRespaldo(ev){
  const f = ev.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = async () => {
    try{
      const data = JSON.parse(r.result);
      if(data && data.check && data.data && data.salt){
        // Respaldo cifrado
        const pass = prompt('Escribe la contraseña con la que se creó este respaldo:');
        if(pass===null){ ev.target.value=''; return; }
        const key = await derivarLlave(pass, deB64(data.salt)); let ok=false;
        try{ ok = (await descifrar(key, data.check))===CHECK_TOKEN; }catch(_){}
        if(!ok){ alert('Contraseña incorrecta para este respaldo.'); ev.target.value=''; return; }
        if(confirm('Esto reemplazará tus datos actuales por los del respaldo. ¿Continuar?')){
          vault = data; cryptoKey = key; estado = await descifrar(key, data.data);
          localStorage.setItem(VAULT_KEY, JSON.stringify(vault)); if(haySesion()) await guardarSesion(key);
          cerrarModal(); iniciarApp(); toast('Respaldo restaurado ✅');
        }
      } else if(data && (data.perfil!==undefined)){
        // Respaldo antiguo sin cifrar (compatibilidad)
        if(confirm('¿Importar este respaldo? Reemplazará tus datos actuales.')){
          ['perfil','comidas','frecuentes','actividad','peso','medidas','cumplidos'].forEach(k=>{ if(data[k]!=null) estado[k]=data[k]; });
          guardar(); cerrarModal(); render(); toast('Datos importados ✅');
        }
      } else { alert('El archivo no es un respaldo válido de FitCoach.'); }
    }catch(e){ alert('El archivo no es un respaldo válido de FitCoach.'); }
    ev.target.value='';
  };
  r.readAsText(f);
}
