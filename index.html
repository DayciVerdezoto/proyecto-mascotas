<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1f7a5a">
<title>Mi Presupuesto</title>
<style>
  :root{
    --verde:#1f7a5a; --verde-claro:#e3f5ec; --verde-borde:#7fd1ac;
    --amarillo:#b8860b; --amarillo-bg:#fff7e0; --amarillo-borde:#f0d27a;
    --rojo:#c0392b; --rojo-bg:#fdecea; --rojo-borde:#f1a9a0;
    --gris:#6b7280; --gris-claro:#f3f4f6; --borde:#e5e7eb;
    --texto:#1f2937; --fondo:#f7f8fa; --tarjeta:#ffffff;
    --azul:#2563eb; --sombra:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--fondo); color:var(--texto); line-height:1.45; font-size:15px;
  }
  header{
    background:var(--verde); color:#fff; padding:16px 20px;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
    position:sticky; top:0; z-index:20; box-shadow:var(--sombra);
  }
  header h1{font-size:20px; margin:0; display:flex; align-items:center; gap:8px;}
  .mes-nav{display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.15); border-radius:10px; padding:4px;}
  .mes-nav button{background:transparent; border:none; color:#fff; font-size:18px; cursor:pointer; padding:2px 10px; border-radius:8px;}
  .mes-nav button:hover{background:rgba(255,255,255,.2);}
  .mes-nav span{font-weight:600; min-width:130px; text-align:center; text-transform:capitalize;}
  .wrap{max-width:1100px; margin:0 auto; padding:18px;}
  .grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px; margin-bottom:18px;}
  .kpi{background:var(--tarjeta); border:1px solid var(--borde); border-radius:14px; padding:14px 16px; box-shadow:var(--sombra);}
  .kpi .label{font-size:12.5px; color:var(--gris); text-transform:uppercase; letter-spacing:.4px; font-weight:600;}
  .kpi .valor{font-size:24px; font-weight:700; margin-top:4px;}
  .kpi.ingreso .valor{color:var(--verde);}
  .kpi.gasto .valor{color:var(--rojo);}
  .kpi.saldo .valor{color:var(--azul);}
  .seccion{background:var(--tarjeta); border:1px solid var(--borde); border-radius:14px; box-shadow:var(--sombra); margin-bottom:18px; overflow:hidden;}
  .seccion-cab{display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--borde); flex-wrap:wrap; gap:10px;}
  .seccion-cab h2{font-size:17px; margin:0; display:flex; align-items:center; gap:8px;}
  .seccion-cuerpo{padding:8px 18px 18px;}
  .btn{border:none; border-radius:9px; padding:8px 14px; font-size:14px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px;}
  .btn-primario{background:var(--verde); color:#fff;}
  .btn-primario:hover{background:#1a674c;}
  .btn-sec{background:var(--gris-claro); color:var(--texto); border:1px solid var(--borde);}
  .btn-sec:hover{background:#e9ebee;}
  .btn-mini{padding:5px 10px; font-size:13px;}
  .btn-peligro{background:transparent; color:var(--rojo); border:1px solid var(--rojo-borde);}
  .btn-peligro:hover{background:var(--rojo-bg);}
  .btn-link{background:none; border:none; color:var(--azul); cursor:pointer; font-size:13px; padding:4px; text-decoration:underline;}
  table{width:100%; border-collapse:collapse;}
  th,td{text-align:left; padding:9px 8px; border-bottom:1px solid var(--borde); font-size:14px;}
  th{color:var(--gris); font-size:12px; text-transform:uppercase; letter-spacing:.3px;}
  td.num,th.num{text-align:right; font-variant-numeric:tabular-nums;}
  .fila-vacia{color:var(--gris); text-align:center; padding:18px; font-style:italic;}
  input,select{font-family:inherit; font-size:14px; padding:8px 10px; border:1px solid var(--borde); border-radius:8px; background:#fff; color:var(--texto); width:100%;}
  input:focus,select:focus{outline:2px solid var(--verde-borde); border-color:var(--verde);}
  .form-linea{display:flex; gap:8px; flex-wrap:wrap; align-items:flex-end; margin-top:10px;}
  .campo{display:flex; flex-direction:column; gap:3px;}
  .campo label{font-size:12px; color:var(--gris); font-weight:600;}
  .cat{border:1px solid var(--borde); border-radius:12px; padding:14px; margin-bottom:12px; transition:.2s; background:#fff;}
  .cat.pagada{background:var(--verde-claro); border-color:var(--verde-borde);}
  .cat.alerta{background:var(--amarillo-bg); border-color:var(--amarillo-borde);}
  .cat.excedida{background:var(--rojo-bg); border-color:var(--rojo-borde);}
  .cat-cab{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;}
  .cat-nombre{font-weight:700; font-size:15.5px; display:flex; align-items:center; gap:8px;}
  .tag{font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; text-transform:uppercase; letter-spacing:.3px;}
  .tag-fijo{background:#e8eefc; color:#2547a8;}
  .tag-variable{background:#f0eafc; color:#6b3fb8;}
  .cat-montos{font-size:13.5px; color:var(--gris); font-variant-numeric:tabular-nums;}
  .cat-montos b{color:var(--texto);}
  .barra{height:10px; background:var(--gris-claro); border-radius:20px; overflow:hidden; margin:10px 0 4px;}
  .barra > div{height:100%; border-radius:20px; transition:width .3s; background:var(--verde);}
  .barra.amarillo > div{background:var(--amarillo);}
  .barra.rojo > div{background:var(--rojo);}
  .barra.full-verde > div{background:var(--verde);}
  .cat-pie{display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-top:6px;}
  .pct{font-size:12.5px; font-weight:700;}
  .pct.ok{color:var(--verde);} .pct.warn{color:var(--amarillo);} .pct.bad{color:var(--rojo);}
  .acciones{display:flex; gap:6px; flex-wrap:wrap;}
  .estado-pago{display:flex; align-items:center; gap:6px; font-size:13px; cursor:pointer; user-select:none;}
  .check{width:20px; height:20px; border:2px solid var(--verde); border-radius:6px; display:inline-flex; align-items:center; justify-content:center; font-size:14px; color:#fff; font-weight:bold;}
  .check.on{background:var(--verde);}
  .gastos-lista{margin-top:10px; border-top:1px dashed var(--borde); padding-top:8px;}
  .gasto-item{display:flex; align-items:center; justify-content:space-between; gap:8px; padding:4px 0; font-size:13.5px;}
  .gasto-item .g-desc{color:var(--gris);}
  .gasto-item .g-monto{font-variant-numeric:tabular-nums; font-weight:600;}
  .x{background:none; border:none; color:var(--rojo); cursor:pointer; font-size:15px; line-height:1; padding:2px 4px;}
  .add-gasto{display:flex; gap:6px; margin-top:8px; flex-wrap:wrap;}
  .add-gasto input.desc{flex:2; min-width:120px;} .add-gasto input.monto{flex:1; min-width:90px;}
  .alerta-banner{background:var(--amarillo-bg); border:1px solid var(--amarillo-borde); color:#7a5b00; padding:10px 14px; border-radius:10px; margin-bottom:14px; display:flex; align-items:center; gap:8px; font-size:14px;}
  .alerta-banner.rojo{background:var(--rojo-bg); border-color:var(--rojo-borde); color:#8a2018;}
  .alerta-banner ul{margin:4px 0 0; padding-left:20px;}
  .pie-tools{display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin:24px 0 40px;}
  .modal-fondo{position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:center; justify-content:center; z-index:50; padding:16px;}
  .modal-fondo.activo{display:flex;}
  .modal{background:#fff; border-radius:16px; padding:22px; width:100%; max-width:440px; box-shadow:0 10px 40px rgba(0,0,0,.2);}
  .modal h3{margin:0 0 14px;}
  .modal .campo{margin-bottom:12px;}
  .modal-acciones{display:flex; gap:10px; justify-content:flex-end; margin-top:6px;}
  .hint{font-size:12.5px; color:var(--gris); margin-top:4px;}
  @media(max-width:600px){
    .kpi .valor{font-size:20px;}
    header h1{font-size:17px;}
    .wrap{padding:12px;}
  }
</style>
</head>
<body>
<header>
  <h1>💰 Mi Presupuesto</h1>
  <div class="mes-nav">
    <button id="mesAnt" title="Mes anterior">‹</button>
    <span id="mesActual">—</span>
    <button id="mesSig" title="Mes siguiente">›</button>
  </div>
</header>

<div class="wrap">

  <!-- Alertas -->
  <div id="alertas"></div>

  <!-- Resumen -->
  <div class="grid">
    <div class="kpi ingreso"><div class="label">Ingresos del mes</div><div class="valor" id="kIngresos">—</div></div>
    <div class="kpi"><div class="label">Presupuesto asignado</div><div class="valor" id="kPresupuesto">—</div></div>
    <div class="kpi gasto"><div class="label">Gastado / Pagado</div><div class="valor" id="kGastado">—</div></div>
    <div class="kpi saldo"><div class="label">Saldo disponible</div><div class="valor" id="kSaldo">—</div></div>
  </div>

  <!-- INGRESOS -->
  <div class="seccion">
    <div class="seccion-cab">
      <h2>📥 Ingresos</h2>
      <span class="cat-montos">Total: <b id="totalIngresos">—</b></span>
    </div>
    <div class="seccion-cuerpo">
      <table>
        <thead><tr><th>Categoría</th><th class="num">Monto</th><th style="width:40px"></th></tr></thead>
        <tbody id="tablaIngresos"></tbody>
      </table>
      <div class="form-linea">
        <div class="campo" style="flex:2; min-width:160px;">
          <label>Categoría de ingreso</label>
          <input id="inIngNombre" placeholder="Ej. Salario, Freelance, Bono…" list="sugIngresos">
          <datalist id="sugIngresos">
            <option>Salario</option><option>Salario cónyuge</option><option>Freelance</option>
            <option>Negocio</option><option>Bono</option><option>Otros ingresos</option>
          </datalist>
        </div>
        <div class="campo" style="flex:1; min-width:110px;">
          <label>Monto</label>
          <input id="inIngMonto" type="number" inputmode="decimal" min="0" step="any" placeholder="0.00">
        </div>
        <button class="btn btn-primario" id="btnAddIngreso">＋ Agregar</button>
      </div>
    </div>
  </div>

  <!-- CATEGORIAS DE GASTO -->
  <div class="seccion">
    <div class="seccion-cab">
      <h2>📤 Categorías de gasto y presupuesto</h2>
      <button class="btn btn-primario btn-mini" id="btnNuevaCat">＋ Nueva categoría</button>
    </div>
    <div class="seccion-cuerpo">
      <div id="contCategorias"></div>
    </div>
  </div>

  <div class="pie-tools">
    <button class="btn btn-sec" id="btnExportar">⬇️ Exportar respaldo</button>
    <button class="btn btn-sec" id="btnImportar">⬆️ Importar respaldo</button>
    <button class="btn btn-sec" id="btnCopiarMes">📋 Copiar presupuesto del mes anterior</button>
    <button class="btn btn-peligro" id="btnReset">🗑️ Borrar datos del mes</button>
    <input type="file" id="fileImport" accept="application/json" style="display:none">
  </div>
</div>

<!-- Modal categoría -->
<div class="modal-fondo" id="modalCat">
  <div class="modal">
    <h3 id="modalTitulo">Nueva categoría</h3>
    <div class="campo">
      <label>Nombre</label>
      <input id="mNombre" placeholder="Ej. Alimentación">
    </div>
    <div class="campo">
      <label>Tipo</label>
      <select id="mTipo">
        <option value="fijo">Pago fijo (se marca como pagado → verde)</option>
        <option value="variable">Gasto variable (registras cada gasto)</option>
      </select>
      <div class="hint" id="mHint"></div>
    </div>
    <div class="campo">
      <label>Presupuesto asignado</label>
      <input id="mPresupuesto" type="number" inputmode="decimal" min="0" step="any" placeholder="0.00">
    </div>
    <div class="modal-acciones">
      <button class="btn btn-sec" id="mCancelar">Cancelar</button>
      <button class="btn btn-primario" id="mGuardar">Guardar</button>
    </div>
  </div>
</div>

<script>
"use strict";
const MONEDA = "Q"; // Símbolo de moneda. Cámbialo por "$" si lo prefieres.
const UMBRAL_ALERTA = 0.8; // 80%
const STORAGE_KEY = "miPresupuesto_v1";

const MESES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];

// ---- Categorías iniciales sugeridas (primer uso) ----
function categoriasIniciales(){
  return [
    {id:uid(), nombre:"Renta",               tipo:"fijo",     presupuesto:0, pagado:false, gastos:[]},
    {id:uid(), nombre:"Servicios básicos",   tipo:"fijo",     presupuesto:0, pagado:false, gastos:[]},
    {id:uid(), nombre:"Préstamos",           tipo:"fijo",     presupuesto:0, pagado:false, gastos:[]},
    {id:uid(), nombre:"Tarjetas",            tipo:"fijo",     presupuesto:0, pagado:false, gastos:[]},
    {id:uid(), nombre:"Niños",               tipo:"fijo",     presupuesto:0, pagado:false, gastos:[]},
    {id:uid(), nombre:"Alimentación",        tipo:"variable", presupuesto:0, pagado:false, gastos:[]},
    {id:uid(), nombre:"Comidas fuera de casa",tipo:"variable",presupuesto:0, pagado:false, gastos:[]},
    {id:uid(), nombre:"Transporte",          tipo:"variable", presupuesto:0, pagado:false, gastos:[]},
  ];
}

// ---------- Utilidades ----------
function uid(){ return Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4); }
function hoy(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; }
function fmt(n){
  return MONEDA + " " + (Number(n)||0).toLocaleString("es-GT",{minimumFractionDigits:2, maximumFractionDigits:2});
}
function etiquetaMes(clave){
  const [a,m]=clave.split("-"); return `${MESES[parseInt(m,10)-1]} ${a}`;
}
function gastadoCat(c){
  if(c.tipo==="fijo") return c.pagado ? Number(c.presupuesto)||0 : 0;
  return (c.gastos||[]).reduce((s,g)=>s+(Number(g.monto)||0),0);
}

// ---------- Estado ----------
let estado = cargar();
let mesVisible = hoy();
asegurarMes(mesVisible);

function cargar(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){ console.warn("No se pudo leer almacenamiento", e); }
  return { meses:{} };
}
function guardar(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(estado)); }
  catch(e){ alert("No se pudieron guardar los datos en este navegador."); }
}
function asegurarMes(clave){
  if(!estado.meses) estado.meses={};
  if(!estado.meses[clave]){
    // Si es el primer mes que se crea, precargar categorías sugeridas.
    const esPrimero = Object.keys(estado.meses).length===0;
    estado.meses[clave] = { ingresos:[], categorias: esPrimero ? categoriasIniciales() : [] };
    guardar();
  }
  return estado.meses[clave];
}
function mesData(){ return estado.meses[mesVisible]; }

// ---------- Render ----------
function render(){
  document.getElementById("mesActual").textContent = etiquetaMes(mesVisible);
  const m = mesData();

  // Ingresos
  const totalIng = m.ingresos.reduce((s,i)=>s+(Number(i.monto)||0),0);
  const tbody = document.getElementById("tablaIngresos");
  tbody.innerHTML = "";
  if(m.ingresos.length===0){
    tbody.innerHTML = `<tr><td colspan="3" class="fila-vacia">Aún no has registrado ingresos.</td></tr>`;
  }else{
    m.ingresos.forEach(i=>{
      const tr=document.createElement("tr");
      tr.innerHTML = `<td>${escapar(i.nombre)}</td><td class="num">${fmt(i.monto)}</td>
        <td class="num"><button class="x" data-del-ing="${i.id}" title="Eliminar">✕</button></td>`;
      tbody.appendChild(tr);
    });
  }
  document.getElementById("totalIngresos").textContent = fmt(totalIng);

  // Categorías
  const cont = document.getElementById("contCategorias");
  cont.innerHTML = "";
  let totalPresu=0, totalGastado=0;
  if(m.categorias.length===0){
    cont.innerHTML = `<div class="fila-vacia">No hay categorías. Crea una con “＋ Nueva categoría”.</div>`;
  }
  m.categorias.forEach(c=>{
    const presu = Number(c.presupuesto)||0;
    const gastado = gastadoCat(c);
    totalPresu += presu; totalGastado += gastado;
    const pct = presu>0 ? gastado/presu : (gastado>0?1.5:0);
    const pctTxt = presu>0 ? Math.round(pct*100) : (gastado>0? "∞":0);

    let claseCat="", claseBarra="", clasePct="ok";
    if(c.tipo==="fijo"){
      if(c.pagado){ claseCat="pagada"; claseBarra="full-verde"; }
    }else{
      if(presu>0 && pct>1){ claseCat="excedida"; claseBarra="rojo"; clasePct="bad"; }
      else if(pct>=UMBRAL_ALERTA){ claseCat="alerta"; claseBarra="amarillo"; clasePct="warn"; }
    }

    const div=document.createElement("div");
    div.className="cat "+claseCat;
    const anchoBarra = Math.min(pct*100,100);

    let cabDerecha;
    if(c.tipo==="fijo"){
      cabDerecha = `<div class="estado-pago" data-toggle="${c.id}">
          <span class="check ${c.pagado?'on':''}">${c.pagado?'✓':''}</span>
          ${c.pagado? 'Pagado' : 'Marcar pagado'}
        </div>`;
    }else{
      cabDerecha = `<span class="pct ${clasePct}">${pctTxt}${pct>0?'%':'%'} usado</span>`;
    }

    div.innerHTML = `
      <div class="cat-cab">
        <span class="cat-nombre">${escapar(c.nombre)}
          <span class="tag ${c.tipo==='fijo'?'tag-fijo':'tag-variable'}">${c.tipo==='fijo'?'Pago fijo':'Variable'}</span>
        </span>
        ${cabDerecha}
      </div>
      <div class="cat-montos">
        ${c.tipo==='fijo'
          ? `Presupuesto: <b>${fmt(presu)}</b>`
          : `<b>${fmt(gastado)}</b> de <b>${fmt(presu)}</b> · disponible <b>${fmt(Math.max(presu-gastado,0))}</b>`}
      </div>
      <div class="barra ${claseBarra}"><div style="width:${anchoBarra}%"></div></div>
      <div class="cat-pie">
        <span class="cat-montos">${c.tipo==='fijo'
            ? (c.pagado?'✅ Pagado este mes':'⏳ Pendiente de pago')
            : `${pctTxt===0?'Sin gastos aún':''}`}</span>
        <span class="acciones">
          <button class="btn btn-sec btn-mini" data-edit="${c.id}">✏️ Editar</button>
          <button class="btn btn-peligro btn-mini" data-del-cat="${c.id}">Eliminar</button>
        </span>
      </div>
      ${c.tipo==='variable' ? renderGastos(c) : ''}
    `;
    cont.appendChild(div);
  });

  // KPIs
  document.getElementById("kIngresos").textContent = fmt(totalIng);
  document.getElementById("kPresupuesto").textContent = fmt(totalPresu);
  document.getElementById("kGastado").textContent = fmt(totalGastado);
  document.getElementById("kSaldo").textContent = fmt(totalIng - totalGastado);

  renderAlertas(m, totalIng, totalPresu);
  guardar();
}

function renderGastos(c){
  const items = (c.gastos||[]).map(g=>`
    <div class="gasto-item">
      <span class="g-desc">${escapar(g.desc||"Gasto")}</span>
      <span><span class="g-monto">${fmt(g.monto)}</span>
        <button class="x" data-del-gasto="${c.id}|${g.id}" title="Eliminar">✕</button></span>
    </div>`).join("");
  return `<div class="gastos-lista">
      ${items || '<div class="cat-montos">Registra tus gastos para ir devengando el presupuesto.</div>'}
      <div class="add-gasto">
        <input class="desc" placeholder="Descripción (ej. Súper)" data-gdesc="${c.id}">
        <input class="monto" type="number" inputmode="decimal" min="0" step="any" placeholder="Monto" data-gmonto="${c.id}">
        <button class="btn btn-primario btn-mini" data-addgasto="${c.id}">＋</button>
      </div>
    </div>`;
}

function renderAlertas(m, totalIng, totalPresu){
  const cont=document.getElementById("alertas");
  cont.innerHTML="";
  const avisos=[], criticos=[];

  m.categorias.forEach(c=>{
    if(c.tipo!=="variable") return;
    const presu=Number(c.presupuesto)||0;
    if(presu<=0) return;
    const g=gastadoCat(c), pct=g/presu;
    if(pct>1) criticos.push(`${c.nombre}: te pasaste por ${fmt(g-presu)} (${Math.round(pct*100)}%)`);
    else if(pct>=UMBRAL_ALERTA) avisos.push(`${c.nombre}: vas en ${Math.round(pct*100)}% del presupuesto`);
  });

  // Presupuesto asignado supera ingresos
  if(totalIng>0 && totalPresu>totalIng){
    criticos.push(`Asignaste ${fmt(totalPresu)} en presupuestos pero tus ingresos son ${fmt(totalIng)} (faltan ${fmt(totalPresu-totalIng)}).`);
  }

  if(criticos.length){
    const d=document.createElement("div"); d.className="alerta-banner rojo";
    d.innerHTML=`<span>🚨</span><div><b>Atención:</b><ul>${criticos.map(x=>`<li>${escapar(x)}</li>`).join("")}</ul></div>`;
    cont.appendChild(d);
  }
  if(avisos.length){
    const d=document.createElement("div"); d.className="alerta-banner";
    d.innerHTML=`<span>⚠️</span><div><b>Vas llegando al límite (80%):</b><ul>${avisos.map(x=>`<li>${escapar(x)}</li>`).join("")}</ul></div>`;
    cont.appendChild(d);
  }
}

function escapar(s){ return String(s??"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ---------- Eventos ----------
document.getElementById("mesAnt").onclick=()=>cambiarMes(-1);
document.getElementById("mesSig").onclick=()=>cambiarMes(1);
function cambiarMes(delta){
  const [a,m]=mesVisible.split("-").map(Number);
  const d=new Date(a, m-1+delta, 1);
  mesVisible=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
  asegurarMes(mesVisible);
  render();
}

document.getElementById("btnAddIngreso").onclick=()=>{
  const nombre=document.getElementById("inIngNombre").value.trim();
  const monto=parseFloat(document.getElementById("inIngMonto").value);
  if(!nombre){ alert("Escribe el nombre de la categoría de ingreso."); return; }
  if(!(monto>0)){ alert("Escribe un monto válido."); return; }
  mesData().ingresos.push({id:uid(), nombre, monto});
  document.getElementById("inIngNombre").value="";
  document.getElementById("inIngMonto").value="";
  render();
};

document.addEventListener("click", e=>{
  const t=e.target.closest("[data-del-ing],[data-toggle],[data-edit],[data-del-cat],[data-addgasto],[data-del-gasto]");
  if(!t) return;
  const m=mesData();
  if(t.dataset.delIng){
    m.ingresos = m.ingresos.filter(i=>i.id!==t.dataset.delIng); render();
  }else if(t.dataset.toggle){
    const c=m.categorias.find(x=>x.id===t.dataset.toggle); if(c){ c.pagado=!c.pagado; render(); }
  }else if(t.dataset.edit){
    abrirModal(t.dataset.edit);
  }else if(t.dataset.delCat){
    const c=m.categorias.find(x=>x.id===t.dataset.delCat);
    if(c && confirm(`¿Eliminar la categoría "${c.nombre}"?`)){
      m.categorias=m.categorias.filter(x=>x.id!==t.dataset.delCat); render();
    }
  }else if(t.dataset.addgasto){
    const id=t.dataset.addgasto;
    const desc=document.querySelector(`[data-gdesc="${id}"]`).value.trim();
    const monto=parseFloat(document.querySelector(`[data-gmonto="${id}"]`).value);
    if(!(monto>0)){ alert("Escribe un monto válido para el gasto."); return; }
    const c=m.categorias.find(x=>x.id===id);
    c.gastos=c.gastos||[]; c.gastos.push({id:uid(), desc, monto}); render();
  }else if(t.dataset.delGasto){
    const [cid,gid]=t.dataset.delGasto.split("|");
    const c=m.categorias.find(x=>x.id===cid);
    if(c){ c.gastos=c.gastos.filter(g=>g.id!==gid); render(); }
  }
});

// Enter para agregar ingreso
["inIngNombre","inIngMonto"].forEach(id=>{
  document.getElementById(id).addEventListener("keydown",e=>{ if(e.key==="Enter") document.getElementById("btnAddIngreso").click(); });
});
// Enter para agregar gasto (delegado)
document.addEventListener("keydown", e=>{
  if(e.key!=="Enter") return;
  const el=e.target;
  if(el.dataset && (el.dataset.gdesc||el.dataset.gmonto)){
    const id=el.dataset.gdesc||el.dataset.gmonto;
    const btn=document.querySelector(`[data-addgasto="${id}"]`); if(btn) btn.click();
  }
});

// ---------- Modal categoría ----------
let editandoId=null;
const modal=document.getElementById("modalCat");
document.getElementById("btnNuevaCat").onclick=()=>abrirModal(null);
document.getElementById("mCancelar").onclick=cerrarModal;
modal.addEventListener("click",e=>{ if(e.target===modal) cerrarModal(); });
document.getElementById("mTipo").addEventListener("change", actualizarHint);
function actualizarHint(){
  const v=document.getElementById("mTipo").value;
  document.getElementById("mHint").textContent = v==="fijo"
    ? "Ideal para renta, servicios, préstamos, tarjetas. La marcas como pagada y se pinta de verde."
    : "Ideal para alimentación, comidas fuera, transporte. Registras cada gasto y se descuenta del presupuesto.";
}
function abrirModal(id){
  editandoId=id;
  const m=mesData();
  if(id){
    const c=m.categorias.find(x=>x.id===id);
    document.getElementById("modalTitulo").textContent="Editar categoría";
    document.getElementById("mNombre").value=c.nombre;
    document.getElementById("mTipo").value=c.tipo;
    document.getElementById("mPresupuesto").value=c.presupuesto||"";
  }else{
    document.getElementById("modalTitulo").textContent="Nueva categoría";
    document.getElementById("mNombre").value="";
    document.getElementById("mTipo").value="variable";
    document.getElementById("mPresupuesto").value="";
  }
  actualizarHint();
  modal.classList.add("activo");
  document.getElementById("mNombre").focus();
}
function cerrarModal(){ modal.classList.remove("activo"); editandoId=null; }
document.getElementById("mGuardar").onclick=()=>{
  const nombre=document.getElementById("mNombre").value.trim();
  const tipo=document.getElementById("mTipo").value;
  const presupuesto=parseFloat(document.getElementById("mPresupuesto").value)||0;
  if(!nombre){ alert("Escribe un nombre para la categoría."); return; }
  const m=mesData();
  if(editandoId){
    const c=m.categorias.find(x=>x.id===editandoId);
    c.nombre=nombre; c.tipo=tipo; c.presupuesto=presupuesto;
    if(tipo==="fijo") c.gastos=[]; // al pasar a fijo no usa gastos
  }else{
    m.categorias.push({id:uid(), nombre, tipo, presupuesto, pagado:false, gastos:[]});
  }
  cerrarModal(); render();
};

// ---------- Herramientas ----------
document.getElementById("btnExportar").onclick=()=>{
  const blob=new Blob([JSON.stringify(estado,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`presupuesto-respaldo-${hoy()}.json`;
  a.click(); URL.revokeObjectURL(a.href);
};
document.getElementById("btnImportar").onclick=()=>document.getElementById("fileImport").click();
document.getElementById("fileImport").onchange=ev=>{
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const data=JSON.parse(r.result);
      if(!data.meses) throw new Error("formato");
      if(confirm("Esto reemplazará tus datos actuales por los del respaldo. ¿Continuar?")){
        estado=data; mesVisible=hoy(); asegurarMes(mesVisible); render();
      }
    }catch(e){ alert("El archivo no es un respaldo válido."); }
    ev.target.value="";
  };
  r.readAsText(f);
};
document.getElementById("btnCopiarMes").onclick=()=>{
  const [a,mm]=mesVisible.split("-").map(Number);
  const d=new Date(a, mm-2, 1);
  const claveAnt=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
  const ant=estado.meses[claveAnt];
  if(!ant){ alert("No hay un mes anterior con datos para copiar."); return; }
  if(!confirm("Se copiarán las categorías y presupuestos del mes anterior (sin los gastos ni los pagos marcados). ¿Continuar?")) return;
  const m=mesData();
  m.categorias = ant.categorias.map(c=>({id:uid(), nombre:c.nombre, tipo:c.tipo, presupuesto:c.presupuesto, pagado:false, gastos:[]}));
  render();
};
document.getElementById("btnReset").onclick=()=>{
  if(confirm(`¿Borrar TODOS los datos de ${etiquetaMes(mesVisible)}? Esto no se puede deshacer.`)){
    estado.meses[mesVisible]={ ingresos:[], categorias:[] };
    render();
  }
};

// ---------- Inicio ----------
render();
</script>
</body>
</html>
