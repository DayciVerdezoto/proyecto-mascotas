name: Publicar en GitHub Pages

# Publica la app (index.html) automáticamente cada vez que se actualiza la
# rama principal. Para activarlo una sola vez:
#   Repositorio → Settings → Pages → Build and deployment → Source: "GitHub Actions"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues simultáneos
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Subir el sitio
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4
